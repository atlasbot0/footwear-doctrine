# Golden Q&A seed v0.1 — grows to 150–200 in P6. answer_refs are entity ids the retrieval must surface.
questions:
  - {q: "What edge distance do overlay stitches typically sit from the panel edge on athletic uppers?", a: "~3 mm on overlays (first row on cut edges often 1.5–2 mm); pair with gauge between rows.", answer_refs: [prp-edge-distance-gauge], source_refs: [nb-1906r-sheet]}
  - {q: "What SPI should I spec for sneaker upper seams and how does seam strength scale?", a: "6–10 SPI typical (1906R runs ~4 mm pitch = 6–8); strength ≈ SPI × thread strength × 1.5 lockstitch / 1.7 chainstitch.", answer_refs: [prp-spi-stitch-density], source_refs: [coats-hub, nb-1906r-sheet]}
  - {q: "What is a deubré?", a: "The ornamental lace-plate threaded across the lower laces; metal versions need nickel-release compliance.", answer_refs: [cmp-deubre]}
  - {q: "Blake vs Blake Rapid?", a: "Blake: one through-seam, sleek, weather-exposed. Blake Rapid adds a midsole + outer Rapid outsole stitch for weather/chunk.", answer_refs: [con-blake, con-blake-rapid]}
  - {q: "Why do PVC welts fail compliance at major brands?", a: "PVC is prohibited outright at majors (NB exemplar: Beilstein screen, any detection = violation) and carries phthalate limits; substitute TPR/TPU welts.", answer_refs: [cmp-welt, mat-pvc, std-rsl-framework]}
  - {q: "Typical collar foam spec for a lifestyle runner?", a: "Open-cell PU ~25–40 kg/m³; 1906R anchors 15 mm Achilles / 8 mm sides at ~30 kg/m³.", answer_refs: [cmp-collar-padding]}
  - {q: "What density band separates CM EVA from injection phylon?", a: "CM ~0.18–0.25 g/cm³; injection phylon ~0.12–0.20 — the tooling/cost fork of athletic midsoles.", answer_refs: [mat-eva]}
  - {q: "Which leather has the best strength-to-weight and why is it exiting major-brand lines?", a: "Kangaroo — uniform fibre structure keeps strength when split thin; animal-welfare policy exits (NB end-2024) and state bans are retiring it.", answer_refs: [mat-leather-kangaroo]}
  - {q: "What's the difference between a toe puff and a toe box?", a: "Toe puff = the stiffener; toe box = the space it creates. 1906R anchor: 0.6–0.8 mm TPU set ~30 mm back.", answer_refs: [cmp-toe-puff]}
  - {q: "What makes gemming the debated part of Goodyear construction?", a: "The canvas rib is cemented to the insole; if it delaminates the inseam anchor fails — the hand-welted holdfast avoids this by cutting the rib from the insole itself.", answer_refs: [cmp-gemming-rib, con-goodyear-welt]}
  - {q: "Shore A for outsole rubber — what range?", a: "General 55–75 Shore A; hard-wearing carbon rubber runs higher (1906R NDurance 85–90). Never compare Shore A to Asker C.", answer_refs: [prp-shore-hardness, mat-rubber-carbon]}
  - {q: "What is sacchetto and how does it differ from San Crispino?", a: "Sacchetto bags the lining into a sock (unstructured luxe); San Crispino wraps the lasting allowance over the insole edge and stitches through it (structured, visible inside stitch).", answer_refs: [con-sacchetto, con-san-crispino]}
  - {q: "Why does pull-up leather threaten cement bonds?", a: "Its oil/wax stuffing migrates and contaminates bond lines — flag surface prep or mechanical attachment.", answer_refs: [mat-leather-pull-up, prc-halogenation-priming]}
  - {q: "What does an RSL table row contain?", a: "CAS number, substance, adult limit, children's limit, regulation basis, test method, lab detection limit — the grammar of brand chemical compliance.", answer_refs: [std-rsl-framework]}
  - {q: "MRSL vs RSL?", a: "RSL restricts what's IN the product; MRSL restricts what's used in the FACTORY (solvents, primers, inks) — cement lines answer to MRSL.", answer_refs: [std-mrsl-zdhc, std-rsl-framework]}
  - {q: "What thread chemistry for vulcanised shoes and why?", a: "Polyester — nylon yellows in the autoclave heat (Coats guidance).", answer_refs: [prp-spi-stitch-density, con-vulcanised], source_refs: [coats-hub]}
  - {q: "What eyestay opening widths should a sneaker spec carry?", a: "Base 15–20 mm tapering to 10–15 mm at the top (house example 20→12); reinforce the top two eyelets and bartack.", answer_refs: [cmp-eyestay], source_refs: [vince-spec-guidance]}
  - {q: "What are the house QC thresholds for a sneaker production spec?", a: "Bond ≥3.0 N/cm, SPI tolerance ±1, flex ≥50,000 cycles, outsole abrasion ≤150 mm³, colourfastness dry 4 / wet 3–4.", answer_refs: [prp-peel-strength, prp-abrasion-din, prp-spi-stitch-density], source_refs: [vince-spec-template]}
  - {q: "Do lifestyle NB models carry carbon plates?", a: "No — 574/990-class run plateless; carbon plates (1–3 mm) live in FuelCell-class racers.", answer_refs: [cmp-shank], source_refs: [vince-spec-guidance]}
